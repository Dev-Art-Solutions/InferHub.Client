name: build and test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dotnet-version: [ '9.0.x', '10.0.x' ]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore InferHub.Client.sln

      - name: Format check
        run: dotnet format InferHub.Client.sln --verify-no-changes

      - name: Build
        run: dotnet build InferHub.Client.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test InferHub.Client.sln --configuration Release --no-build
